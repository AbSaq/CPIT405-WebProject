<body>
<header>
    <h1>Get In Touch</h1>
    <p>Abdulrahman Salem bin Akeel (2237252)</p>
    <nav>
        <ul>
            <li><a href="index.html">Home/CV</a></li>
            <li><a href="labs.html">Labs</a></li>
            <li><a href="contact.html" class="active">Contact</a></li>
        </ul>
    </nav>
</header>

<main>
    <section class="form-only-container">
        <article class="modern-card">
            <h3><i class="fas fa-paper-plane"></i> Send a Message</h3>
            <p style="color: var(--text-muted); margin-bottom: 2rem; font-size: 0.95rem;">
                Fill out the form below to send a message directly to my university email.
            </p>

            <form action="https://formsubmit.co/your-email@stu.kau.edu.sa" method="POST" class="contact-form">
                <div class="form-group">
                    <label for="name">Full Name</label>
                    <input type="text" id="name" name="name" placeholder="e.g. Khalid Al-Amri" required>
                </div>

                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" name="email" placeholder="name@example.com" required>
                </div>

                <div class="form-group">
                    <label for="message">Message</label>
                    <textarea id="message" name="message" rows="5" placeholder="How can I help you?"
                              required></textarea>
                </div>

                <button type="submit" class="button--primary modern-btn">
                    <span>Send Message</span>
                    <i class="fas fa-arrow-right"></i>
                </button>
            </form>
        </article>
    </section>
</main>

</body>
